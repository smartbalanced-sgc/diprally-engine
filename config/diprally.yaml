    stock_peers: ["RKLB", "IRDM"]
    etf_peer: ""
  RKLB:
    sigma_class: HIGH
    sector_expected: "Industrials / Aerospace & Defense"
    stock_peers: ["ASTS", "LMT"]
    etf_peer: ""
  PL:
    sigma_class: HIGH
    sector_expected: "Technology / Software"
    stock_peers: ["MAXR", "SPIR"]
    etf_peer: ""
  SATS:
    sigma_class: HIGH
    sector_expected: "Communication Services / Telecom"
    stock_peers: ["IRDM", "VSAT"]
    etf_peer: ""
  GHM:
    sigma_class: HIGH
    sector_expected: "Industrials / Specialty Industrial Machinery"
    stock_peers: ["ROP", "WTS"]
    etf_peer: ""

  # ---- MID class (σ 30-60% typical; large caps, mature) ----
  INTC:
    sigma_class: MID
    sector_expected: "Technology / Semiconductors"
    stock_peers: ["AMD", "AVGO"]
    etf_peer: ""
  IPGP:
    sigma_class: MID
    sector_expected: "Technology / Communication Equipment"
    stock_peers: ["LITE", "COHR"]
    etf_peer: ""
  LITE:
    sigma_class: MID
    sector_expected: "Technology / Communication Equipment"
    stock_peers: ["IPGP", "COHR"]
    etf_peer: ""
  MU:
    sigma_class: MID
