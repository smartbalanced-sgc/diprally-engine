# DipRally Engine — single source of truth for all configurable values.
# Sacred decision #17: src/ holds code only. Changing a threshold must NEVER
# require a code edit, PR, or deploy — only an edit to this file.
#
# Schema validated by src/config.py at import time via pydantic. Type errors,
# missing keys, or out-of-range values fail loudly before the engine runs.
#
# Scope of this W2 foundation lift: top-level constants previously in
# src/config.py (~50 keys). Future W2 sessions extend the lift to:
#   - Embedded signal thresholds in src/signals.py (D-W2-6, ~30 keys)
#   - Scattered tunables in src/engine.py / src/data_fetch.py / src/math_utils.py
#     (D-W2-5, D-W2-7, D-W2-8, D-W2-9)
#   - Per-ticker registry (D-W2-1, peer mappings + σ-class hints + sector)

version: "DIPNRALLY-v1.0"

# -----------------------------------------------------------
# Data sources
# -----------------------------------------------------------
data:
  fmp_base_url: "https://financialmodelingprep.com/stable"
  default_lookback_days: 730

# -----------------------------------------------------------
# Anthropic pricing — Opus 4.7, Sonnet 4.6, Haiku 4.5.
# Verify against https://docs.anthropic.com/en/api/pricing before each wave.
# Expressed per token (divide $/M by 1e6 to get this form).
# -----------------------------------------------------------
ai_pricing:
  opus_input_per_token: 0.000015      # $15/M input
  opus_output_per_token: 0.000075     # $75/M output
  sonnet_input_per_token: 0.000003    # $3/M input
  sonnet_output_per_token: 0.000015   # $15/M output
  haiku_input_per_token: 0.000001     # $1/M input
  haiku_output_per_token: 0.000005    # $5/M output
  web_search_per_use: 0.01            # $0.01 per web_search invocation

# Canonical model IDs. Updating these here switches every dispatch site.
ai_models:
  opus: "claude-opus-4-7"
  sonnet: "claude-sonnet-4-6"
  haiku: "claude-haiku-4-5-20251001"

# -----------------------------------------------------------
# Blend weights. Sum need not equal 1.0 — blend_with_uncertainty normalizes.
# -----------------------------------------------------------
# Sacred decision #15: insider signal dropped (Form 4 lag + noise).
# Was 0.05 in v1 and 0.02 in v2 — fully removed in D-W2-16 (W2 hotfix).
# Weight redistributed proportionally across the remaining signals so the
# nominal-sum is unchanged. Specific reallocation choices:
#   v1: insider 0.05 → split: historical +0.02, analyst +0.02, ai +0.01
#       (favors signals with structural forward-looking content)
#   v2: insider 0.02 → split: ai +0.01, analyst +0.01
#       (smaller reallocation; ai and analyst already dominant)
blend_weights_v1:
  historical: 0.12
  analyst: 0.17
  sector: 0.08
  macro: 0.07
  ai: 0.31
  short_interest: 0.05
  peer_rs: 0.10
  sector_decoupling: 0.10

blend_weights_v2:
  historical: 0.05
  analyst: 0.16
  sector: 0.04
  macro: 0.07
  short_interest: 0.02
  peer_rs: 0.10
  sector_decoupling: 0.10
  ai: 0.26
  catalyst_proximity: 0.10
  narrative: 0.10

# Standard error per qualitative confidence tier (decimal annualised return).
confidence_to_se:
  HIGH: 0.05
  MEDIUM: 0.10
  LOW: 0.20

# -----------------------------------------------------------
# Conviction thresholds (sacred decisions #1, #13)
# -----------------------------------------------------------
conviction:
  dip_marginal: 0.65            # P(touch dip) threshold
  rally_conditional: 0.75       # P(rally | dip touched) threshold
  ev_hurdle_bps_of_dip: 50      # sacred #13: refuse if EV < 50bps of dip

# -----------------------------------------------------------
# Horizon + MC paths
# -----------------------------------------------------------
horizon:
  default_days: 60
  default_mc_paths: 100000
  deep_dip_autoscale_threshold: 0.40
  deep_dip_autoscale_paths: 200000

# -----------------------------------------------------------
# Grid scan (dip × rally) — D-W3-1 will σ-class the step in W3
# -----------------------------------------------------------
grid:
  dip_step_dollars: 10.0
  rally_step_dollars: 10.0
  dip_max_depth_pct: 0.40       # scan down to (1 - 0.40) × spot
  rally_max_reach_pct: 0.60     # scan up to (1 + 0.60) × spot
  panic_floor_pct: 0.30         # path-metrics panic floor (W3 σ-class varying)

# -----------------------------------------------------------
# AI vol_regime → vol multiplier (drives effective σ in MC)
# -----------------------------------------------------------
ai_vol_regime_multipliers:
  HIGH: 1.15
  MEDIUM: 1.00
  LOW: 0.90

# -----------------------------------------------------------
# Structural narrative score → drift adjustment (annualised pp)
# -----------------------------------------------------------
narrative_drift_adjustment:
  strong: 0.05
  neutral: 0.00
  weak: -0.05

# -----------------------------------------------------------
# Bull/bear factor arithmetic (Pass 1 factor counting)
# -----------------------------------------------------------
factor_arithmetic:
  weights:
    high: 3
    med: 2
    low: 1
  net_threshold: 4              # |bull - bear| > 4 triggers tail bias
  tail_bias: 0.05               # ±5pp drift bias when threshold exceeded

# -----------------------------------------------------------
# Catalyst Z-score (unusual-move detector)
# -----------------------------------------------------------
catalyst:
  z_threshold: 3.0

# -----------------------------------------------------------
# Vol schedule multipliers around catalysts (drives time-varying σ)
# -----------------------------------------------------------
vol_schedule_multipliers:
  self_earnings_day: 3.0
  self_earnings_pre_post: 1.5
  self_earnings_window_days: 2
  peer_earnings_day: 1.8
  peer_earnings_pre_post: 1.3
  peer_earnings_window_days: 1
  macro_event_day: 1.5

# -----------------------------------------------------------
# Three-method tolerance (σ-scaled). Sacred decision #16.
# Bridge residual scales ~linearly with σ. Constant thresholds are wrong
# for any σ outside the σ-class they were tuned against.
#   σ=0.30 → flag 2.0pp, refuse 3.6pp
#   σ=1.00 → flag 3.0pp, refuse 5.4pp
#   σ=1.50 → flag 4.5pp, refuse 8.1pp
# -----------------------------------------------------------
method_tolerance:
  marginal_floor_pp: 2.0
  marginal_multiplier: 3.0
  first_passage_floor_pp: 3.0
  first_passage_multiplier: 4.0
  refusal_multiplier: 1.8       # refuse threshold = 1.8 × flag threshold

# -----------------------------------------------------------
# Backtest layer gate
# -----------------------------------------------------------
backtest:
  min_samples: 30

# -----------------------------------------------------------
# Analyst signal extreme-outlier sanity gate (D-W2-13).
# |implied_drift| > threshold downgrades confidence one notch + adds
# verification flag to notes. MOG-A smoke surfaced -58.9% HIGH conf —
# data-quality red flag, not full-weight blend contribution.
# -----------------------------------------------------------
analyst_outlier_threshold: 0.50

# -----------------------------------------------------------
# Sacred decision #14 — trend filter.
# Refuse dip if 30d momentum < this threshold AND no in-horizon catalyst
# with direction_risk in (bullish, two-sided). The idea: don't catch
# falling knives without a thesis. A stock down >25% in 30 days is in
# falling-knife territory; entering its dip without a verifiable bullish
# or balanced catalyst is empirically negative-EV.
#
# In --no-ai mode there are no catalysts to evaluate — strict reading
# refuses when mom_30d below threshold (we can't verify there's no
# falling-knife risk, so default to safe).
# -----------------------------------------------------------
trend_filter:
  mom_30d_threshold: -0.25

# -----------------------------------------------------------
# Macro regime detection (data_fetch.fetch_macro_indicators).
# Sourced from VIX level + SPY-vs-MA50 trend.
# D-W2-8: lifted from inline literals in data_fetch.py.
# -----------------------------------------------------------
macro_regime:
  vix_risk_off_threshold: 25.0      # VIX above → risk_off
  vix_risk_on_threshold: 15.0       # VIX below + SPY > spy_risk_on → risk_on
  spy_risk_off_threshold: -0.03     # SPY/MA50 below → risk_off
  spy_risk_on_threshold: 0.02       # SPY/MA50 above + VIX < vix_risk_on → risk_on
  vix_default_fallback: 18.0        # used when FMP quote endpoint returns nothing

# -----------------------------------------------------------
# Options IV liquidity gate (data_fetch.fetch_options_iv).
# D-W2-8: lifted from inline literals.
# -----------------------------------------------------------
options_iv:
  liquidity_max_bid_ask_pct: 0.10   # avg bid-ask spread above this → not liquid
  default_target_dte_days: 60       # caller usually overrides with horizon_days
  dte_window_min: 7                 # discard near-expiration noise
  dte_window_max_multiplier: 2.0    # max DTE = target × this

# -----------------------------------------------------------
# Sector performance lookback (data_fetch.fetch_sector_perf).
# -----------------------------------------------------------
sector_perf:
  default_lookback_days: 30

# -----------------------------------------------------------
# PDE Crank-Nicolson grid resolution (math_utils.pde_two_barrier).
# Trade-off: finer grid = better accuracy but slower runtime. D-W2-9.
# -----------------------------------------------------------
pde_grid:
  n_space: 400        # spatial discretization
  n_time: 2000        # temporal discretization

# -----------------------------------------------------------
# GARCH(1,1) fit parameters (math_utils.fit_garch_11 + fit_garch_11_full).
# D-W2-9.
# -----------------------------------------------------------
garch:
  min_data_bars: 50              # below this → fall back to rolling variance
  fallback_bars: 90              # rolling variance computed on tail(N).var()
  initial_omega: 0.01            # neg-log-likelihood optimizer starting point
  initial_omega_full: 0.0001     # full-fit version uses tighter omega seed
  initial_alpha: 0.05
  initial_beta: 0.90

# -----------------------------------------------------------
# Realized volatility windows (math_utils.compute_realized_vol). D-W2-9.
# The (30, 60, 90)-day triple drives σ triangulation alongside GARCH + IV.
# -----------------------------------------------------------
realized_vol_windows: [30, 60, 90]

# -----------------------------------------------------------
# Engine-level scattered tunables (D-W2-5 + D-W2-7).
# -----------------------------------------------------------
engine:
  drift_cap: 1.0                          # |mu_hist| capped at this before enrichment
  spread_per_share_round_trip: 2.0        # friction proxy (W3 will σ-class-vary)
  garch_fallback_sigma: 0.30              # used when GARCH fit fails AND realized < 90 bars
  grid_prefilter_looseness: 0.08          # candidates within (threshold - this) survive

# Bayesian smoothing parameters (signals.bayesian_update + engine fallbacks).
bayesian:
  prior_age_inflation_per_day: 0.2        # prior_var multiplier per day of staleness
  default_prior_std: 0.15                 # used when CSV history missing the column
  std_floor: 0.05                         # min std anywhere in the smoothing
  default_today_std_when_blend_fails: 0.25  # used when blend_with_uncertainty returns None

# Mean reversion anchor (engine MC). Disabled by default (--mean-reversion 0.0).
# When enabled, anchor is positioned anchor_pct_below_spot below current spot.
mean_reversion:
  anchor_pct_below_spot: 0.05

# Pass 2 prompt closed-form bracket — frames the math context Pass 2 sees.
# Currently ±10% from spot. Researchers may tune this to investigate
# Pass 2's sensitivity to the math anchor.
pass2_prompt:
  closed_form_bracket_pct: 0.10

# Sensitivity scenarios (engine.compute_sensitivity_table).
# Researcher can add / remove / re-parameterize rows here. Per-catalyst
# stress shocks from AI continue to append after these baseline rows.
# -----------------------------------------------------------
# Signal-level embedded thresholds (D-W2-6).
# Each sub-section feeds one signal_from_* function in src/signals.py.
# Researcher can tune any threshold without code edits.
# -----------------------------------------------------------
signals:
  analyst:
    last_month_min_n_for_use: 5         # use last-month avg if ≥ this analysts
    last_month_high_conf_n: 12          # HIGH conf if ≥ this analysts
    last_quarter_min_n_for_use: 5
    last_quarter_medium_conf_n: 15
    staleness_move_60d: 0.25            # downgrade if 60d move > this AND not last-month
    spread_high_conf: 0.10              # consensus fallback spread brackets
    spread_medium_conf: 0.25

  sector_momentum_caps:                 # regime-conditional caps (high, low)
    post_parabola: [0.60, -0.50]        # most conservative (cap LOW conf)
    momentum: [1.00, -0.50]
    default: [1.50, -0.50]

  macro_drift_levels:                   # risk-on / neutral / risk-off drift tilts
    risk_on: 0.10
    neutral: 0.05
    risk_off: -0.05

  historical:
    cap_binding_abs_drift: 1.0          # |raw mu| above → LOW conf (extrapolation risk)
    medium_gating_abs_drift: 0.5        # |capped mu| above → MEDIUM (large drift)

  short_interest_brackets:              # ordered list — first match wins
    - {threshold_lt: 0.03, drift: 0.00,  confidence: MEDIUM, note: "low — neutral"}
    - {threshold_lt: 0.10, drift: -0.03, confidence: MEDIUM, note: "moderate skepticism"}
    - {threshold_lt: 0.20, drift: -0.05, confidence: LOW,    note: "elevated — tail risk both directions"}
    - {threshold_lt: 1.00, drift: 0.05,  confidence: LOW,    note: "very high — squeeze tail upside"}

  peer_rs:
    drift_cap_abs: 0.30                 # max |annualised RS|
    dispersion_high_conf: 0.05          # peer-return std for HIGH conf
    dispersion_medium_conf: 0.15

  sector_decoupling:
    drift_cap_abs: 0.20                 # max |annualised decoupling|
    magnitude_low_conf: 0.02            # |raw decouple| brackets
    magnitude_medium_conf: 0.10

  regime_detection:                     # detect_swing_regime triggers
    sigma_high_threshold: 0.50
    mom_5d_threshold: 0.02              # |5d momentum| for momentum classification
    mom_30d_pct_threshold: 5.0          # |30d momentum %| for momentum class
    rsi_overbought: 70.0
    rsi_oversold: 30.0
    ytd_parabola_pct: 200.0             # YTD% above this → POST_PARABOLA

  catalyst_proximity:
    magnitude_drift_map:
      high: 0.10
      med: 0.05
      low: 0.02
    drift_cap_abs: 0.15
    in_window_count_high_conf: 3        # ≥ this in-horizon catalysts → HIGH conf
    in_window_count_medium_conf: 1

# -----------------------------------------------------------
# Sensitivity scenarios (D-W2-7) — already declared above.
# -----------------------------------------------------------
sensitivity_scenarios:
  - label: "Baseline (current)"
    drift_offset: 0.0
    sigma_multiplier: 1.0
  - label: "Drift -15pp"
    drift_offset: -0.15
    sigma_multiplier: 1.0
  - label: "Drift +15pp"
    drift_offset: +0.15
    sigma_multiplier: 1.0
  - label: "σ -20%"
    drift_offset: 0.0
    sigma_multiplier: 0.80
  - label: "σ +20%"
    drift_offset: 0.0
    sigma_multiplier: 1.20
  - label: "Hostile (Δ-15, σ+20)"
    drift_offset: -0.15
    sigma_multiplier: 1.20

# -----------------------------------------------------------
# Phantom-signal std accounting (W1).
# When AI-derived signals (ai, catalyst_proximity, narrative) drop with
# NONE_FOUND status, their nominal weight contributes to within_var via
# this SE. Reflects "we don't have forward-looking synthesis" honestly.
# -----------------------------------------------------------
phantom_signal_se: 0.20

# -----------------------------------------------------------
# AI cache (W1) — same-day cache invalidation when spot moves
# -----------------------------------------------------------
ai_cache:
  spot_move_invalidation_pct: 0.01    # ≥1% spot move → cache miss

# -----------------------------------------------------------
# Bag-hold valuation assumption
# -----------------------------------------------------------
bag_hold_terminal_assumption: "median_terminal_dip_paths"

# =============================================================================
# Ticker universe — the working roster. ADD / REMOVE tickers by editing this
# section (sacred decisions #17 + universe-is-config). Engine handles any
# universe size without code modification.
#
# Schema per entry:
#   sigma_class: EXTREME | HIGH | MID   (drives W3 σ-class defaults)
#   sector_expected: free-text (sanity check against FMP profile.sector)
#   stock_peers: list of ticker symbols — used by signal_from_peer_rs.
#                Empty list means no comparable stock peers (use etf_peer).
#   etf_peer: thematic ETF symbol — used as fallback when stock_peers is
#             empty OR when stock_peers fetch fails (D-W2-14 yfinance fallback
#             work). Empty string means no ETF fallback configured (signal
#             gracefully degrades to _none_signal).
#
# Symbol convention: dashes for class shares (MOG-A, BRK-B, BF-B). Matches
# FMP's accepted form and Yahoo Finance's industry-standard form.
# =============================================================================
tickers:
  # ---- EXTREME class (σ > 100% typical; small caps, narrative-driven) ----
  LWLG:
    sigma_class: EXTREME
    sector_expected: "Technology / Communication Equipment"
    stock_peers: []            # no comparable photonics-only public names
    etf_peer: "SOXX"           # iShares Semi ETF — closest cyclical anchor
  MRAM:
    sigma_class: EXTREME
    sector_expected: "Technology / Semiconductors"
    stock_peers: []
    etf_peer: "SOXX"
  ENGN:
    sigma_class: EXTREME
    sector_expected: "Healthcare / Biotechnology"
    stock_peers: []
    etf_peer: "XBI"            # SPDR S&P Biotech ETF (per CLAUDE.md hint)
  VELO3D:
    sigma_class: EXTREME
    sector_expected: "Industrials / Aerospace & Defense"
    stock_peers: []
    etf_peer: "PPA"            # Invesco Aerospace & Defense ETF

  # ---- HIGH class (σ 60-100% typical; mid-caps, momentum / space / defense) ----
  ASTS:
    sigma_class: HIGH
    sector_expected: "Communication Services / Telecom"
    stock_peers: ["RKLB", "IRDM"]
    etf_peer: ""
  RKLB:
    sigma_class: HIGH
    sector_expected: "Industrials / Aerospace & Defense"
    stock_peers: ["ASTS", "LMT"]
    etf_peer: ""
  PL:
    sigma_class: HIGH
    sector_expected: "Technology / Software"
    stock_peers: ["MAXR", "SPIR"]
    etf_peer: ""
  SATS:
    sigma_class: HIGH
    sector_expected: "Communication Services / Telecom"
    stock_peers: ["IRDM", "VSAT"]
    etf_peer: ""
  GHM:
    sigma_class: HIGH
    sector_expected: "Industrials / Specialty Industrial Machinery"
    stock_peers: ["ROP", "WTS"]
    etf_peer: ""

  # ---- MID class (σ 30-60% typical; large caps, mature) ----
  INTC:
    sigma_class: MID
    sector_expected: "Technology / Semiconductors"
    stock_peers: ["AMD", "AVGO"]
    etf_peer: ""
  IPGP:
    sigma_class: MID
    sector_expected: "Technology / Communication Equipment"
    stock_peers: ["LITE", "COHR"]
    etf_peer: ""
  LITE:
    sigma_class: MID
    sector_expected: "Technology / Communication Equipment"
    stock_peers: ["IPGP", "COHR"]
    etf_peer: ""
  MU:
    sigma_class: MID
    sector_expected: "Technology / Semiconductors"
    stock_peers: ["SNDK", "WDC", "STX"]
    etf_peer: ""
  STX:
    sigma_class: MID
    sector_expected: "Technology / Computer Hardware"
    stock_peers: ["MU", "SNDK", "WDC"]
    etf_peer: ""
  AMAT:
    sigma_class: MID
    sector_expected: "Technology / Semiconductor Equipment"
    stock_peers: ["LRCX", "KLAC"]
    etf_peer: ""
  MOG-A:
    sigma_class: MID
    sector_expected: "Industrials / Aerospace & Defense"
    stock_peers: ["HEI", "TDG", "CW"]
    etf_peer: ""
  GLW:
    sigma_class: MID
    sector_expected: "Technology / Communication Equipment"
    stock_peers: ["AAOI", "CIEN"]
    etf_peer: ""

# -----------------------------------------------------------
# v3 review criteria — LOCKED at v2 ship, executed at 30 days of runtime
# -----------------------------------------------------------
v3_review_criteria:
  n_days_min: 30
  calibration_dip_target: [0.60, 0.70]
  calibration_rally_cond_target: [0.70, 0.80]
  ai_pass2_critique_rate_min: 0.20
  catalyst_signal_correlation_min: 0.10
  bag_hold_rate_target: [0.10, 0.20]
